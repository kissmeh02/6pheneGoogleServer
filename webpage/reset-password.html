<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | 6phene</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body {
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: var(--spacing-md);
        }

        .login-card {
            background: var(--color-bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--color-border);
            padding: 3rem 2.5rem;
            border-radius: var(--border-radius-lg);
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius-md);
            color: var(--color-text-primary);
            font-family: var(--font-family-sans);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .success-message, .error-message {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-align: center;
            min-height: 1.25rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .success-message {
            color: #10b981;
        }

        .error-message {
            color: #ef4444;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--color-text-muted);
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--color-primary);
        }

        .info-box {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: var(--border-radius-md);
            padding: 1rem;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--color-text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar" style="position: absolute; background: transparent; border: none;">
        <div class="container nav-content">
            <a href="index.html" class="logo">6<span>phene</span></a>
        </div>
    </nav>

    <main class="login-section">
        <div class="hero-bg"></div>
        <div class="hero-mesh"></div>
        
        <div class="login-card">
            <div class="login-header">
                <h1>Reset Password</h1>
                <p style="color: var(--color-text-secondary);">Enter your email to receive reset instructions</p>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>

                <div id="successMessage" class="success-message">
                    Password reset link sent! Check your email.
                </div>
                <div id="errorMessage" class="error-message">
                    Email not found in our system.
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Send Reset Link
                </button>
            </form>

            <div class="info-box">
                <strong>For Demo/Testing:</strong><br>
                Contact your administrator to reset your password.<br>
                Admin Email: info@6phene.com
            </div>

            <a href="login.html" class="back-link">← Back to Login</a>
        </div>
    </main>

    <script src="js/particles.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            const btn = e.target.querySelector('button');

            // Simulate API call
            btn.textContent = 'Sending...';
            btn.disabled = true;

            setTimeout(() => {
                // In a real app, this would call your backend API
                // For now, we'll simulate success for any valid email format
                if (email.includes('@')) {
                    successMsg.style.opacity = '1';
                    errorMsg.style.opacity = '0';
                    document.getElementById('email').value = '';
                    
                    // Reset button after delay
                    setTimeout(() => {
                        btn.textContent = 'Send Reset Link';
                        btn.disabled = false;
                        successMsg.style.opacity = '0';
                    }, 5000);
                } else {
                    errorMsg.style.opacity = '1';
                    successMsg.style.opacity = '0';
                    btn.textContent = 'Send Reset Link';
                    btn.disabled = false;
                }
            }, 1500);
        });
    </script>
</body>
</html>
