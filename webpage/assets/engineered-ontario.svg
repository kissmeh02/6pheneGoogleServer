<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030304"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="skyline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#38bdf8" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Graphene hexagon pattern (top right) -->
  <g stroke="#38bdf8" stroke-opacity="0.12" stroke-width="0.8" fill="none" transform="translate(550, 30)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17"/>
    <polygon points="90,0 120,17 120,52 90,69 60,52 60,17"/>
    <polygon points="150,0 180,17 180,52 150,69 120,52 120,17"/>
    <polygon points="0,69 30,86 30,121 0,138 -30,121 -30,86"/>
    <polygon points="60,69 90,86 90,121 60,138 30,121 30,86"/>
    <polygon points="120,69 150,86 150,121 120,138 90,121 90,86"/>
    <polygon points="180,69 210,86 210,121 180,138 150,121 150,86"/>
    <polygon points="30,138 60,155 60,190 30,207 0,190 0,155"/>
    <polygon points="90,138 120,155 120,190 90,207 60,190 60,155"/>
    <polygon points="150,138 180,155 180,190 150,207 120,190 120,155"/>
  </g>

  <!-- Graphene hexagon pattern (bottom left) -->
  <g stroke="#38bdf8" stroke-opacity="0.08" stroke-width="0.8" fill="none" transform="translate(20, 280)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17"/>
    <polygon points="90,0 120,17 120,52 90,69 60,52 60,17"/>
    <polygon points="150,0 180,17 180,52 150,69 120,52 120,17"/>
    <polygon points="60,69 90,86 90,121 60,138 30,121 30,86"/>
    <polygon points="120,69 150,86 150,121 120,138 90,121 90,86"/>
  </g>

  <!-- CN Tower silhouette -->
  <g fill="url(#skyline)" transform="translate(80, 120)">
    <rect x="8" y="0" width="4" height="200" rx="2"/>
    <rect x="4" y="30" width="12" height="8" rx="1"/>
    <rect x="2" y="140" width="16" height="25" rx="3"/>
    <ellipse cx="10" cy="145" rx="12" ry="8" fill="#38bdf8" fill-opacity="0.08"/>
  </g>

  <!-- City skyline silhouette -->
  <g fill="#38bdf8" fill-opacity="0.08">
    <rect x="110" y="260" width="25" height="60"/>
    <rect x="140" y="240" width="20" height="80"/>
    <rect x="165" y="270" width="18" height="50"/>
    <rect x="188" y="250" width="22" height="70"/>
    <rect x="215" y="265" width="15" height="55"/>
    <rect x="50" y="275" width="20" height="45"/>
    <rect x="30" y="285" width="15" height="35"/>
  </g>

  <!-- Ontario map outline (simplified) -->
  <path d="M620,100 Q640,80 670,85 Q700,90 720,110 Q740,130 735,160 Q730,190 710,210 Q690,230 670,225 Q650,220 640,200 Q630,180 620,170 Q610,150 615,130 Q618,115 620,100Z"
        stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1.5" fill="#38bdf8" fill-opacity="0.04"/>
  <text x="670" y="155" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#38bdf8" fill-opacity="0.4" text-anchor="middle">ON</text>

  <!-- Maple leaf (subtle) -->
  <g transform="translate(700, 340) scale(0.5)" fill="#38bdf8" fill-opacity="0.15">
    <path d="M25,0 L28,10 L38,8 L32,16 L40,22 L30,22 L28,32 L25,24 L22,32 L20,22 L10,22 L18,16 L12,8 L22,10 Z"/>
  </g>

  <!-- Circuit traces -->
  <g stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1" fill="none">
    <path d="M550,200 L600,200 L620,180"/>
    <path d="M550,220 L580,220 L600,240 L640,240"/>
    <circle cx="620" cy="180" r="3" fill="#38bdf8" fill-opacity="0.2"/>
    <circle cx="640" cy="240" r="3" fill="#38bdf8" fill-opacity="0.2"/>
    <circle cx="550" cy="200" r="2" fill="#38bdf8" fill-opacity="0.15"/>
    <circle cx="550" cy="220" r="2" fill="#38bdf8" fill-opacity="0.15"/>
  </g>

  <!-- Main text: CREATED IN ONTARIO -->
  <text x="400" y="185" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="#f5f5f7" text-anchor="middle" letter-spacing="3" filter="url(#glow)">CREATED IN ONTARIO</text>

  <!-- CANADA text -->
  <text x="400" y="230" font-family="Inter, sans-serif" font-size="36" font-weight="300" fill="#38bdf8" text-anchor="middle" letter-spacing="8">CANADA</text>

  <!-- Tagline -->
  <text x="400" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#86868b" text-anchor="middle" letter-spacing="2">Rooted in Community, Driven by Innovation</text>

  <!-- Divider line -->
  <line x1="300" y1="290" x2="500" y2="290" stroke="url(#cyanGrad)" stroke-opacity="0.3" stroke-width="1"/>

  <!-- 6PHENE branding at bottom -->
  <text x="400" y="320" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#38bdf8" fill-opacity="0.5" text-anchor="middle" letter-spacing="4">6PHENE INC</text>

  <!-- Corner accents -->
  <path d="M20,20 L50,20 M20,20 L20,50" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1.5"/>
  <path d="M780,20 L750,20 M780,20 L780,50" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1.5"/>
  <path d="M20,430 L50,430 M20,430 L20,400" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1.5"/>
  <path d="M780,430 L750,430 M780,430 L780,400" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Glowing dots -->
  <circle cx="400" cy="80" r="2" fill="#38bdf8" fill-opacity="0.4" filter="url(#softGlow)"/>
  <circle cx="200" cy="180" r="1.5" fill="#38bdf8" fill-opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="680" cy="300" r="1.5" fill="#38bdf8" fill-opacity="0.3" filter="url(#softGlow)"/>
</svg>