<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080A"/>
      <stop offset="100%" stop-color="#0C1118"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.55" cy="0.55" r="0.4">
      <stop offset="0%" stop-color="#1AFFD5" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1AFFD5" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Simplified Ontario province outline -->
  <g transform="translate(200,80) scale(0.75)" opacity="0.25">
    <path d="M350,50 L420,40 L480,60 L520,45 L560,70 L580,110 L600,100 L620,130 L590,160 L610,200 L580,230 L600,270 L570,300 L580,340 L550,370 L560,410 L530,440 L500,430 L470,460 L440,440 L410,470 L380,450 L350,480 L320,460 L290,490 L260,470 L230,450 L210,480 L180,460 L160,430 L140,460 L120,430 L100,400 L120,370 L100,340 L130,310 L110,280 L140,250 L120,220 L150,190 L130,160 L160,130 L180,150 L200,120 L220,140 L240,110 L260,130 L280,100 L300,80 L320,90 L350,50Z"
      fill="none" stroke="#1AFFD5" stroke-width="1.5"/>
  </g>

  <!-- GTA / Toronto dot -->
  <circle cx="420" cy="380" r="6" fill="#1AFFD5" opacity="0.8"/>
  <circle cx="420" cy="380" r="12" fill="none" stroke="#1AFFD5" stroke-width="0.8" opacity="0.4"/>
  <circle cx="420" cy="380" r="20" fill="none" stroke="#1AFFD5" stroke-width="0.5" opacity="0.2"/>

  <!-- Label -->
  <text x="420" y="415" text-anchor="middle" font-family="monospace" font-size="10" fill="#1AFFD5" opacity="0.7" letter-spacing="2">ONTARIO, CANADA</text>
  <text x="420" y="432" text-anchor="middle" font-family="monospace" font-size="8" fill="#5C6E7E" letter-spacing="1.5">GREATER TORONTO AREA</text>

  <!-- Ottawa dot -->
  <circle cx="520" cy="320" r="3" fill="#5C6E7E" opacity="0.5"/>
  <text x="540" y="324" font-family="monospace" font-size="7" fill="#5C6E7E" opacity="0.4" letter-spacing="1">OTTAWA</text>

  <!-- Connection lines (tech aesthetic) -->
  <line x1="420" y1="380" x2="520" y2="320" stroke="#1AFFD5" stroke-width="0.3" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Grid overlay -->
  <g opacity="0.04" stroke="#1AFFD5" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Coordinates display -->
  <text x="40" y="560" font-family="monospace" font-size="8" fill="#5C6E7E" opacity="0.3" letter-spacing="1">43.6532 N, 79.3832 W</text>
  <text x="760" y="560" text-anchor="end" font-family="monospace" font-size="8" fill="#5C6E7E" opacity="0.3" letter-spacing="1">FEDERALLY INCORPORATED CBCA</text>
</svg>
