<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a84ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#30d158;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark Background -->
  <rect width="100%" height="100%" fill="#101010"/>
  
  <!-- Abstract Graphene Sheets -->
  <g stroke="url(#grad1)" stroke-width="1.5" fill="none" filter="url(#glow)">
    <!-- Hexagon Grid 1 -->
    <path d="M100,100 L150,70 L200,100 L200,160 L150,190 L100,160 Z" opacity="0.6" />
    <path d="M200,100 L250,70 L300,100 L300,160 L250,190 L200,160 Z" opacity="0.4" />
    <path d="M150,190 L200,220 L250,190" opacity="0.5" />
    
    <!-- Connecting Lines -->
    <line x1="150" y1="190" x2="150" y2="250" opacity="0.3" />
    <line x1="250" y1="190" x2="250" y2="250" opacity="0.3" />
  </g>

  <!-- Floating Particles -->
  <circle cx="150" cy="70" r="3" fill="#0a84ff" opacity="0.8" />
  <circle cx="300" cy="160" r="3" fill="#30d158" opacity="0.8" />
  
  <!-- Text Overlay Placeholder -->
  <text x="400" y="300" font-family="Arial" font-size="24" fill="#333" text-anchor="middle">Graphene Structure</text>
</svg>

