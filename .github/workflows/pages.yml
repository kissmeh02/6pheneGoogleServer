name: Deploy v2 Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'webpage/v2/**'
      - 'webpage/assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          # Copy v2 as root
          cp -r webpage/v2/* _site/
          # Copy shared assets
          cp -r webpage/assets _site/assets
          # Copy SEO files
          cp webpage/robots.txt _site/ 2>/dev/null || true
          cp webpage/sitemap.xml _site/ 2>/dev/null || true
          cp webpage/site.webmanifest _site/ 2>/dev/null || true
          # Create .nojekyll to skip Jekyll processing
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
