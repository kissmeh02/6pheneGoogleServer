name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GCP Server
    runs-on: ubuntu-latest

    env:
      W3F_ACCESS_KEY: ${{ secrets.W3F_ACCESS_KEY }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: W3F_ACCESS_KEY
          script: |
            set -e
            cd /root/webbpage

            # Discard local changes from previous deploy's file copies
            git checkout -- .

            # Pull latest code
            git pull origin main

            # Inject Web3Forms key into JS
            sed -i "s/%%W3F_ACCESS_KEY%%/$W3F_ACCESS_KEY/g" webpage/v2/js/forms.js

            # Deploy v2 as the main site — copy v2 files over old webpage root
            cp -f webpage/v2/index.html webpage/index.html
            cp -rf webpage/v2/css/* webpage/css/ 2>/dev/null || mkdir -p webpage/css && cp -rf webpage/v2/css/* webpage/css/
            cp -rf webpage/v2/js/* webpage/js/ 2>/dev/null || mkdir -p webpage/js && cp -rf webpage/v2/js/* webpage/js/

            # SEO files
            cp -f webpage/robots.txt webpage/ 2>/dev/null || true
            cp -f webpage/sitemap.xml webpage/ 2>/dev/null || true

            # Reload web server
            sudo systemctl reload apache2 2>/dev/null || sudo systemctl reload nginx 2>/dev/null || true

            echo "v2 deployed at $(date)"
