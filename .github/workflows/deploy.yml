name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GCP Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/Main

            # Pull latest code
            git pull origin main

            # Copy v2 site to be the root webpage
            cp -r webpage/v2/* webpage/

            # Copy WebP images and new assets
            cp webpage/assets/*.webp webpage/v2/ 2>/dev/null || true

            # Copy SEO files to root
            cp webpage/robots.txt webpage/ 2>/dev/null || true
            cp webpage/sitemap.xml webpage/ 2>/dev/null || true

            # Reload nginx
            sudo systemctl reload nginx || sudo nginx -s reload

            echo "Deployment complete at $(date)"
