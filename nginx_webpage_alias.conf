# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name _;

    # Allow Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /root/Main/webpage;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server (main application server)
server {
    listen 443 ssl http2;
    server_name _;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/6phene.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/6phene.com/privkey.pem;

    # SSL Configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/6phene.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    root /root/Main/webpage;

    # Enable Gzip Compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # 3. Modern Invoice System - Backend API (Served at /api/) - MUST come before location /
    location /api/ {
        # Remove /api/ prefix when forwarding to backend
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Performance optimizations
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # 2. Modern Invoice System - Frontend (Served at /invoice/)
    location /invoice/ {
        proxy_pass http://127.0.0.1:5173/invoice/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Performance optimizations
        proxy_buffering off;  # Disable buffering for WebSocket
        proxy_read_timeout 86400s;  # Long timeout for dev server
    }

    # Static Assets - CSS, JS, Assets (Optimized with compression and caching)
    location ~* \.(css|js|json)$ {
        root /root/Main/webpage;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;  # Don't log static assets for performance
    }

    location /css/ {
        alias /root/Main/webpage/css/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        alias /root/Main/webpage/js/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        alias /root/Main/webpage/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images with optimized caching
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        root /root/Main/webpage;
        expires 6M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 1. Existing Webpage (Also available at /webpage/)
    location /webpage/ {
        alias /root/Main/webpage/;
        index index.html;
        try_files $uri $uri/ /webpage/index.html;
    }

    # Root location - serve webpage files (MUST be last)
    location / {
        root /root/Main/webpage;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
